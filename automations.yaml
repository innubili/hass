- id: '1650735139689'
  alias: Alarm when GARAGE-door left open
  description: 'Triggers if Rudy & Mary leave and door is not fully closed'
  triggers:
    - trigger: state
      entity_id: 
        - person.rudy_federici
        - device_tracker.mary_s_iphonex
      to: 'not_home'
      for:
        minutes: 5
  conditions:
    - condition: state
      entity_id: person.rudy_federici
      state: 'not_home'
    - condition: state
      entity_id: device_tracker.mary_s_iphonex
      state: 'not_home'
    # Condition: The door is NOT fully closed
    - condition: state
      entity_id: binary_sensor.garage_door_fully_closed
      state: 'off'
  actions:
    - data:
        title: "ALARM: Garage Not Closed"
        message: "You both left, but the garage is either open or stuck!"
      action: notify.notify
  mode: single

  


- id: 'garage_closure_watchdog'
  alias: "Garage Closure Watchdog"
  description: "Ensures door closes even if triggered by car remote"
  triggers:
    # Triggered when the door starts moving away from fully open
    - trigger: state
      entity_id: binary_sensor.garage_door_fully_open
      from: "on"
      to: "off"
  actions:
    # Wait for the typical duration it takes to close (e.g., 20 seconds)
    - delay: "00:00:20"
    # Check: Is it actually closed now?
    - if:
        - condition: state
          entity_id: binary_sensor.garage_door_fully_closed
          state: "off"
      then:
        # It's stuck! Run the recovery script
        - action: script.garage_smart_recovery
  mode: restart # Restart the timer if the door is toggled again quickly