- id: '1650735139689'
  alias: Alarm when GARAGE-door left open
  description: ''
  triggers:
  - entity_id:
    - cover.garage_door
    to: closing
    for:
      hours: 0
      minutes: 0
      seconds: 10
    trigger: state
  conditions:
  - condition: and
    conditions:
    - condition: state
      entity_id: person.rudy_federici
      state:
      - not_home
      for:
        hours: 0
        minutes: 5
        seconds: 0
    - condition: and
      conditions:
      - condition: state
        entity_id: device_tracker.mary_s_iphonex
        state: not_home
        for:
          hours: 0
          minutes: 5
          seconds: 0
  actions:
  - data:
      title: ALARM garage open
      message: Mary & Rudy left home but garage is NOT closed
    action: notify.notify
  mode: single
- id: '1653639138002'
  alias: Cambiatoio Toggle
  description: ''
  trigger: []
  condition: []
  action:
  - if:
    - condition: device
      device_id: a8bfbb58c69480ba17f25a3fdc6f168b
      domain: cover
      entity_id: cover.pergola_tenda_sud
      type: is_position
      above: 95
    then:
    - service: cover.set_cover_position
      data:
        position: 0
      target:
        entity_id: cover.pergola_tenda_sud
    - service: cover.set_cover_position
      data:
        position: 0
      target:
        entity_id:
        - cover.pergola_tenda_nord
        - cover.pergola_tenda_west
    else:
    - service: cover.set_cover_position
      data:
        position: 100
      target:
        entity_id: cover.pergola_tenda_sud
    - service: cover.set_cover_position
      data:
        position: 75
      target:
        entity_id:
        - cover.pergola_tenda_nord
        - cover.pergola_tenda_west
  mode: queued
- id: '1655246053500'
  alias: Clean DB
  description: ''
  trigger: []
  condition: []
  action:
  - service: recorder.purge
    data:
      keep_days: 10
      repack: true
