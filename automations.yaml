- id: '1779694545131'
  alias: Irrigation Hedge South Hydro1
  description: Irriga la siepe. Controlla umidità del suolo con soglie dinamiche basate
    sulla temperatura massima (API weather.get_forecasts).
  triggers:
  - trigger: time
    at: 06:00:00
  - trigger: numeric_state
    entity_id:
    - sensor.sgs01z_taxus_soil_moisture
    below: 40
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: weather.home
      state:
      - rainy
      - pouring
      - lightning_rainy
  actions:
  - action: weather.get_forecasts
    target:
      entity_id: weather.home
    data:
      type: daily
    response_variable: daily_forecast
  - variables:
      max_temp: '{{ daily_forecast[''weather.forecast_home''].forecast[0].temperature
        | float(20) }}'
      current_moisture: '{{ states(''sensor.sgs01z_taxus_soil_moisture'') | float(100)
        }}'
      moisture_threshold: "{% if max_temp >= 30 %}\n  50\n{% elif max_temp >= 25 %}\n
        \ 45\n{% elif max_temp < 20 %}\n  35\n{% else %}\n  40\n{% endif %}\n"
  - condition: template
    value_template: '{{ current_moisture < (moisture_threshold | float) }}'
  - action: switch.turn_on
    target:
      entity_id: switch.hydro1
  - delay: 00:15:00
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  - delay: 00:30:00
  - action: switch.turn_on
    target:
      entity_id: switch.hydro1
  - delay: 00:15:00
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  - delay: 00:30:00
  - action: switch.turn_on
    target:
      entity_id: switch.hydro1
  - delay: 00:15:00
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  mode: single
