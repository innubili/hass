- id: '1650735139689'
  alias: Alarm when GARAGE-door left open
  description: ''
  triggers:
  - entity_id:
    - cover.garage_door
    to: closing
    for:
      hours: 0
      minutes: 0
      seconds: 10
    trigger: state
  conditions:
  - condition: and
    conditions:
    - condition: state
      entity_id: person.rudy_federici
      state:
      - not_home
      for:
        hours: 0
        minutes: 5
        seconds: 0
    - condition: and
      conditions:
      - condition: state
        entity_id: device_tracker.mary_s_iphonex
        state: not_home
        for:
          hours: 0
          minutes: 5
          seconds: 0
  actions:
  - data:
      title: ALARM garage open
      message: Mary & Rudy left home but garage is NOT closed
    action: notify.notify
  mode: single
- id: '1670965598190'
  alias: garage open at 22:00
