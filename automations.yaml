- id: '1779694545131'
  alias: Irrigation Hedge South Hydro1
  description: Irriga la siepe. Tecnica Soak & Cycle(15m ON, 30m OFF x3). Controlla
    previsioni meteo e temperature per frequenza(3gg o 7gg)
  triggers:
  - trigger: time
    at: 06:00:00
  conditions:
  - condition: template
    value_template: '{% set last_run = this.attributes.last_triggered %} {% set days_since
      = (now() - last_run).days if last_run else 10 %} {% set temp = states(''sensor.outside_temperature'')
      | float(0) %} {{ (temp > 30 and days_since >= 3) or (temp <= 30 and days_since
      >= 7) }}

      '
  - condition: not
    conditions:
    - condition: state
      entity_id: weather.home
      state: rainy
    - condition: state
      entity_id: weather.home
      state: pouring
    - condition: state
      entity_id: weather.home
      state: lightning_rainy
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.hydro1
  - delay: 00:15:00
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  - delay: 00:30:00
  - action: switch.turn_on
    target:
      entity_id: switch.hydro1
  - delay: 00:15:00
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  - delay: 00:30:00
  - action: switch.turn_on
    target:
      entity_id: switch.hydro1
  - delay: 00:15:00
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  mode: single
- id: '1779734149348'
  alias: Irrigation Flowerbed Hydro2
  description: Irriga l'aiuola ogni mattina. Usa la tecnica Soak & Cycle come hydro1,
    ma garantisce l'esecuzione giornaliera ignorando l'umidità del suolo.
  triggers:
  - trigger: time
    at: 06:00:00
    weekday:
    - sun
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
  conditions:
  - condition: not
    conditions:
    - condition: state
      entity_id: weather.home
      state: rainy
    - condition: state
      entity_id: weather.home
      state: pouring
    - condition: state
      entity_id: weather.home
      state: lightning_rainy
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.hydro2
  - delay:
      hours: 0
      minutes: 5
      seconds: 0
      milliseconds: 0
  - action: switch.turn_off
    target:
      entity_id: switch.hydro2
  - delay:
      minutes: 10
  - action: switch.turn_on
    target:
      entity_id: switch.hydro2
  - delay:
      hours: 0
      minutes: 30
      seconds: 0
      milliseconds: 0
  - action: switch.turn_off
    target:
      entity_id: switch.hydro2
    data: {}
  mode: single
- id: '1779734334464'
  alias: 'Watchdog: Auto-Off Irrigation Flowerbed (Hydro2)'
