    below: 200
  actions:
  - action: light.turn_on
    target:
      entity_id: light.slzu_06mu_zb_coordinator_ezsp_all_garden_lights
    data:
      brightness_pct: 25
  mode: single
- id: '1779567212063'
  alias: 'Giardino: Spegnimento Spots'
  description: Spegne il gruppo Spots tutti alle 02:00 e quando si fa chiaro
  triggers:
  - at: 02:00:00
    trigger: time
  - entity_id: sensor.rain_light_sensor_illuminance
