- id: '1670965598190'
  alias: Close Garage if open at night
  description: ''
  triggers:
  - trigger: time
    at:
    - '22:00:00'
    - '23:00:00'
    - '23:59:59'
  conditions:
  - condition: state
    entity_id: binary_sensor.garage_door_fully_closed
    state: 'off'
  actions:
  - action: script.garage_multi_attempt_close
  mode: single
- id: garage_closure_watchdog
  alias: Garage Closure Watchdog
  description: Ensures door closes even if triggered by car remote
  triggers:
  - trigger: state
    entity_id: binary_sensor.garage_door_fully_open
    from: 'on'
    to: 'off'
  actions:
  - delay: 00:00:20
  - if:
    - condition: state
      entity_id: binary_sensor.garage_door_fully_closed
      state: 'off'
    then:
    - action: script.garage_smart_recovery
  mode: restart
- id: '1777551835396'
  alias: Irrigation Hedge South
  description: Irriga la siepe a sud al mattino. Controlla il sensore TS0601, le previsioni
    meteo  e usa la tecnica Soak & Cycle (2 min on, 10 min pausa, 15 min on).
  triggers:
  - at: 06:00:00
    trigger: time
  conditions:
  - condition: numeric_state
    entity_id: sensor.sgs01z_taxus_soil_moisture
    below: 40
  - condition: not
    conditions:
    - condition: state
      entity_id: weather.forecast_home
      state: rainy
    - condition: state
      entity_id: weather.forecast_home
      state: pouring
    - condition: state
      entity_id: weather.forecast_home
      state: lightning_rainy
  actions:
  - action: switch.turn_on
    target:
      entity_id: switch.hydro1
  - delay:
      minutes: 2
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  - delay:
      minutes: 10
  - action: switch.turn_on
    target:
      entity_id: switch.hydro1
  - delay:
      minutes: 15
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  mode: single
- id: '1777552180711'
  alias: 'Watchdog: Auto-Off Irrigation Hedge South'
  description: Spegne l'irrigazione della siepe se rimane accesa per più di 20 minuti.
  triggers:
  - entity_id: switch.hydro1
    to: 'on'
    for:
      minutes: 20
    trigger: state
  conditions: []
  actions:
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  - action: notify.notify
    data:
      title: Allarme Irrigazione!
      message: La valvola della siepe a sud è rimasta aperta troppo a lungo. Il Watchdog
        l'ha spenta.
  mode: single
- id: pergola_roof_safety_master
  alias: 'Pergola: Security Roof Closing'
  description: Chiude il tetto se piove, dopo le 23:00 o se è inverno
  triggers:
  - trigger: state
    entity_id: weather.home
    to: rainy
  - trigger: time
    at: '23:00:00'
  - trigger: state
    entity_id: sensor.season
    to: winter
  - trigger: time_pattern
    hours: /1
  conditions:
  - condition: state
    entity_id: cover.pergola_tetto_corrected
    state: open
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.season
        state: winter
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.pergola_tetto_corrected
      - action: notify.notify
        data:
          title: 'Pergola: Chiusura Invernale'
          message: Tetto chiuso automaticamente perché è inverno.
    - conditions:
      - or:
        - condition: state
          entity_id: weather.home
          state: rainy
        - condition: time
          after: '23:00:00'
          before: 06:00:00
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.pergola_tetto_corrected
      - action: notify.notify
        data:
          title: 'Pergola: Sicurezza'
          message: Tetto chiuso per pioggia o orario notturno.
  mode: restart
- id: '1650735139689'
  alias: Alarm when GARAGE-door left open
  description: Alerts if garage is left open when Rudy and Mary leave
  triggers:
  - trigger: state
    entity_id: cover.garage_door
    to: open
    for:
      minutes: 5
  conditions:
  - condition: state
    entity_id: person.rudy_federici
    state: not_home
  - condition: state
    entity_id: device_tracker.mary_s_iphonex
    state: not_home
  actions:
  - action: notify.notify
    data:
      title: 'ALARM: Garage Open'
      message: Mary & Rudy left home but the garage is still OPEN!
  mode: single
