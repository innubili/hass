- id: '1779436659476'
  alias: 'Watchdog: Welcome Home Lights'
  description: Accende le lampade Sonoff Duo e imposta gli spot al 100% per 3 minuti
    quando viene rilevata una presenza al buio, poi abbassa gli spot al 25%
  triggers:
  - trigger: state
    entity_id: binary_sensor.sonoff_100149f0b2
    to: 'on'
  - trigger: state
    entity_id: binary_sensor.pir_main_door
    to: 'on'
  - trigger: state
    entity_id: binary_sensor.aarlo_motion_entry
    to: 'on'
  conditions:
  - condition: numeric_state
    entity_id: sensor.rain_light_sensor_illuminance
    below: 50
  actions:
  - parallel:
    - action: switch.turn_on
      target:
        entity_id: switch.mini_duo_l_switch_switch
    - action: switch.turn_on
      target:
        entity_id: switch.mini_duo_l_switch_switch_2
    - action: light.turn_on
      target:
        entity_id: light.slzu_06mu_zb_coordinator_ezsp_spots_entrata
      data:
        brightness_pct: 100
        transition: 3
  - delay:
      hours: 0
      minutes: 3
      seconds: 0
  - parallel:
    - action: switch.turn_off
      target:
        entity_id: switch.mini_duo_l_switch_switch
    - action: switch.turn_off
      target:
        entity_id: switch.mini_duo_l_switch_switch_2
    - action: light.turn_on
      target:
        entity_id: light.slzu_06mu_zb_coordinator_ezsp_spots_entrata
      data:
        brightness_pct: 25
        transition: 10
  mode: restart
- id: '1779436862793'
  alias: 'Watchdog: Low Battery Monitor'
  description: Controlla tutte le batterie ogni giorno e invia una notifica se qualcuna
    è sotto il 15%
  triggers:
  - at: '18:00:00'
    trigger: time
  conditions:
  - condition: template
    value_template: "{% set threshold = 15 %} {% set ns = namespace(low_batteries=0)
      %} {% for state in states.sensor %}\n  {% if (state.attributes.device_class
      | default('') == 'battery' or '_battery' in state.entity_id) and '_voltage'
      not in state.entity_id and '_state' not in state.entity_id %}\n    {% if state.state
      | is_number and state.state | int < threshold %}\n      {% set ns.low_batteries
      = ns.low_batteries + 1 %}\n    {% endif %}\n  {% endif %}\n{% endfor %} {{ ns.low_batteries
      > 0 }}\n"
  actions:
  - data:
      title: ⚠️ Avviso Livello Batterie
      message: "Le seguenti batterie sono in esaurimento (sotto il 15%):\n{% set threshold
        = 15 %} {% for state in states.sensor %}\n  {% if (state.attributes.device_class
        | default('') == 'battery' or '_battery' in state.entity_id) and '_voltage'
        not in state.entity_id and '_state' not in state.entity_id %}\n    {% if state.state
        | is_number and state.state | int < threshold %}\n      - {{ state.name }}:
        {{ state.state }}%\n    {% endif %}\n  {% endif %}\n{% endfor %}\n"
    action: notify.pixel_10_pro
  mode: single
