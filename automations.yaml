- id: '1779982470755'
  alias: 'Pergola: Close South Awning in Summer Afternoon (Sensors)'
  description: Closes the south awning (Tenda Strada) after 12:00 from April to October
    if it's hot and sunny, using local pergola sensors.
  triggers:
  - trigger: time
    at: '12:00:00'
  - trigger: numeric_state
    entity_id: sensor.th2_pergola_temprature_2
    above: 23
  - trigger: numeric_state
    entity_id: sensor.rain_light_sensor_illuminance
    above: 3000
  conditions:
  - condition: template
    value_template: '{{ now().month >= 4 and now().month <= 9 }}'
    alias: Incluso tra Aprile e Settembre
  - condition: time
    after: '11:59:59'
    before: '18:00:00'
    alias: È pomeriggio (12:00 - 18:00)
  - condition: numeric_state
    entity_id: sensor.th2_pergola_temprature_2
    above: 23
    alias: Temperatura pergola elevata (sopra i 23°C)
  - condition: numeric_state
    entity_id: sensor.rain_light_sensor_illuminance
    above: 3000
    alias: C'è sole (luminosità sopra i 3000 lx)
  - condition: state
    entity_id: binary_sensor.rain_light_sensor
    state: 'off'
    alias: Non sta piovendo
  actions:
  - action: cover.close_cover
    target:
      entity_id: cover.pergola_tenda_strada
  mode: single
- id: '1780089464509'
  alias: 'Pool Cover Watchdog: Auto Light Off'
