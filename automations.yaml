- id: '1670965598190'
  alias: garage open at 22:00
  description: post alarm
  triggers:
  - at: '22:00:00'
    trigger: time
  - at: '23:00:00'
    trigger: time
  - at: '23:59:59'
    trigger: time
  conditions:
  - condition: and
    conditions:
    - condition: state
      entity_id: binary_sensor.sonoff_100149f0c6
      state: 'on'
      for:
        hours: 0
        minutes: 0
        seconds: 0
  actions:
  - data:
      title: ALARM garage open
      message: it's night and the garage dppr is still open
    action: notify.notify
  mode: single
