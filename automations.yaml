- id: '1650091196760'
  alias: Pool (auto) Open
  description: ''
  trigger: []
  condition: []
  action:
  - service: lcn.send_keys
    data:
      address: home.s0.m21
      keys: A4
      state: make
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
  - service: lcn.send_keys
    data:
      address: home.s0.m21
      keys: A3
      state: hit
  - delay:
      hours: 0
      minutes: 0
      seconds: 1
      milliseconds: 0
  - service: lcn.led
    data:
      address: home.s0.m21
      led: led3
      state: blink
  - service: lcn.send_keys
    data:
      address: home.s0.m21
      keys: A2
      state: hit
  - delay:
      hours: 0
      minutes: 3
      seconds: 0
      milliseconds: 0
  - service: lcn.led
    data:
      address: home.s0.m21
      led: led3
      state: 'on'
  mode: single
