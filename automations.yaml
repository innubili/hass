- id: '1670965598190'
  alias: Close Garage if open at night
  description: ''
  triggers:
  - trigger: time
    at:
    - '22:00:00'
    - '23:00:00'
    - '23:59:59'
  conditions:
  - condition: state
    entity_id: binary_sensor.garage_door_fully_closed
    state: 'on'
  actions:
  - action: script.garage_multi_attempt_close
  mode: single
- id: garage_closure_watchdog
  alias: Garage Closure Watchdog
  description: Ensures door closes even if triggered by car remote
  triggers:
  - trigger: state
    entity_id: binary_sensor.garage_door_fully_open
    from: 'off'
    to: 'on'
  actions:
  - delay: 00:00:20
  - if:
    - condition: state
      entity_id: binary_sensor.garage_door_fully_closed
      state: 'on'
    then:
    - action: script.garage_smart_recovery
- id: '1777552180711'
  alias: 'Watchdog: Auto-Off Irrigation Hedge South (Hydro1)'
  description: Spegne l'irrigazione della siepe se rimane accesa per più di 20 minuti.
  triggers:
  - entity_id: switch.hydro1
    to: 'on'
    for:
      minutes: 35
    trigger: state
  conditions: []
  actions:
  - action: switch.turn_off
    target:
      entity_id: switch.hydro1
  - action: notify.notify
    data:
      title: Allarme Irrigazione!
      message: La valvola della siepe a sud è rimasta aperta troppo a lungo. Il Watchdog
        l'ha spenta.
  mode: single
- id: pergola_roof_safety_master
  alias: 'Pergola: Security Roof Closing'
  description: Chiude il tetto se piove, dopo le 23:00 o se è inverno
  triggers:
  - trigger: state
    entity_id: weather.home
    to: rainy
  - trigger: time
    at: '23:00:00'
  - trigger: state
    entity_id: sensor.season
    to: winter
  - trigger: time_pattern
    hours: /1
  conditions:
  - condition: state
    entity_id: cover.pergola_tetto_corrected
    state: open
  actions:
  - choose:
    - conditions:
      - condition: state
        entity_id: sensor.season
        state: winter
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.pergola_tetto_corrected
      - action: notify.notify
        data:
          title: 'Pergola: Chiusura Invernale'
          message: Tetto chiuso automaticamente perché è inverno.
    - conditions:
      - or:
        - condition: state
          entity_id: weather.home
          state: rainy
        - condition: time
          after: '23:00:00'
          before: 06:00:00
      sequence:
      - action: cover.close_cover
        target:
          entity_id: cover.pergola_tetto_corrected
      - action: notify.notify
        data:
          title: 'Pergola: Sicurezza'
          message: Tetto chiuso per pioggia o orario notturno.
  mode: restart
- id: '1650735139689'
  alias: Alarm when GARAGE-door left open
  description: Alerts if garage is left open when Rudy and Mary leave
  triggers:
  - trigger: state
    entity_id: cover.garage_door
    to: open
    for:
      minutes: 5
  conditions:
  - condition: state
    entity_id: person.rudy_federici
    state: not_home
  - condition: state
    entity_id: device_tracker.mary_s_iphonex
    state: not_home
  actions:
  - action: notify.notify
    data:
      title: 'ALARM: Garage Open'
      message: Mary & Rudy left home but the garage is still OPEN!
  mode: single
- id: '1779314593861'
  alias: Export Entity List to Google Doc
  triggers:
  - at: 03:00:00
    trigger: time
  actions:
  - action: rest_command.post_entities
  mode: single
- id: '1779436659476'
  alias: 'Watchdog: Welcome Home Lights'
  description: Accende le lampade Sonoff Duo e imposta gli spot al 100% per 3 minuti
    quando viene rilevata una presenza al buio, poi abbassa gli spot al 25%
  triggers:
  - entity_id: binary_sensor.sonoff_100149f0b2
    to: 'on'
    trigger: state
  - entity_id: binary_sensor.pir_main_door
    to: 'on'
    trigger: state
  - entity_id: binary_sensor.aarlo_motion_entry
    to: 'on'
    trigger: state
  conditions:
  - condition: numeric_state
    entity_id: sensor.rain_light_sensor_illuminance
    below: 200
  actions:
  - parallel:
    - target:
        entity_id:
        - switch.mini_duo_l_switch_switch
        - switch.mini_duo_l_switch_switch_2
      action: switch.turn_on
    - target:
        entity_id:
        - light.spot2
        - light.spot4
        - light.spot6
        - light.spot8
      data:
        brightness_pct: 100
      action: light.turn_on
  - delay:
      hours: 0
      minutes: 3
      seconds: 0
  - parallel:
    - target:
        entity_id:
        - switch.mini_duo_l_switch_switch
        - switch.mini_duo_l_switch_switch_2
      action: switch.turn_off
    - target:
        entity_id:
        - light.spot2
        - light.spot4
        - light.spot6
        - light.spot8
      data:
        brightness_pct: 25
      action: light.turn_on
  mode: restart
- id: '1779436862793'
  alias: 'Watchdog: Low Battery Monitor'
  description: Controlla tutte le batterie ogni giorno e invia una notifica se qualcuna
    è sotto il 15%
  triggers:
  - at: '18:00:00'
    trigger: time
  conditions:
  - condition: template
    value_template: "{% set threshold = 15 %} {% set ns = namespace(low_batteries=0)
      %} {% for state in states.sensor %}\n  {% if (state.attributes.device_class
      | default('') == 'battery' or '_battery' in state.entity_id) and '_voltage'
      not in state.entity_id and '_state' not in state.entity_id %}\n    {% if state.state
      | is_number and state.state | int < threshold %}\n      {% set ns.low_batteries
      = ns.low_batteries + 1 %}\n    {% endif %}\n  {% endif %}\n{% endfor %} {{ ns.low_batteries
      > 0 }}\n"
  actions:
  - data:
      title: ⚠️ Avviso Livello Batterie
      message: "Le seguenti batterie sono in esaurimento (sotto il 15%):\n{% set threshold
        = 15 %} {% for state in states.sensor %}\n  {% if (state.attributes.device_class
        | default('') == 'battery' or '_battery' in state.entity_id) and '_voltage'
        not in state.entity_id and '_state' not in state.entity_id %}\n    {% if state.state
        | is_number and state.state | int < threshold %}\n      - {{ state.name }}:
        {{ state.state }}%\n    {% endif %}\n  {% endif %}\n{% endfor %}\n"
    action: notify.pixel_10_pro
  mode: single
- id: '1779567176530'
  alias: 'Giardino: Accensione Spots al 25%'
  description: Accende il gruppo Spots tutti al 25% quando fa buio, o alle 05:00 del
