pool_start_swimming:
  alias: pool_start_swimming
  icon: mdi:pool
  description: Apre piscina, abbassa tenda strada e accende luce se è buio
  sequence:
    - action: cover.open_cover
      target:
        entity_id: cover.pool_tetto
    - action: cover.close_cover
      target:
        entity_id: cover.pergola_tenda_strada
    - if:
        - condition: numeric_state
          entity_id: sensor.rain_light_sensor_illuminance
          below: 200
      then:
        - action: switch.turn_on
          target:
            entity_id: switch.pool_u_aussenbekl_pool_light
pool_finished:
  alias: pool_finished
  icon: mdi:pool-off
  description: Chiude piscina e spegne la luce
  sequence:
    - action: cover.close_cover
      target:
        entity_id: cover.pool_tetto
    - action: switch.turn_off
      target:
        entity_id: switch.pool_u_aussenbekl_pool_light
registra_e_notifica_tg138648:
  alias: Registra e Notifica TG138648
  icon: mdi:car-connected
  sequence:
    - action: rest_command.registra_tg138648
      response_variable: risposta_server
      continue_on_error: true
    - if:
        - condition: template
          value_template:
            "{{ risposta_server is defined and risposta_server['status']
            | int == 201 }}"
      then:
        - action: notify.mobile_app_pixel_10_pro
          data:
            title: ✅ Parcheggio Märwil (TG138648)
            message: Auto registrata con successo! Rinnovo tra 11h 45m.
        - action: notify.mobile_app_mary_s_16p
          data:
            title: ✅ Parcheggio Märwil (TG138648)
            message: Auto registrata con successo! Rinnovo tra 11h 45m.
      else:
        - action: notify.mobile_app_pixel_10_pro
          data:
            title: ⚠️ ERRORE Parcheggio (TG138648)
            message:
              "Registrazione fallita! Controlla l'app. Status: {{ risposta_server['status']
              | default('Timeout') }}

              "
        - action: notify.mobile_app_mary_s_16p
          data:
            title: ⚠️ ERRORE Parcheggio (TG138648)
            message:
              "Registrazione fallita! Controlla l'app. Status: {{ risposta_server['status']
