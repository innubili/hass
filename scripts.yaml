# --- GARAGE RELAY CONTROL ---
pulse_garage_relay:
  alias: "Pulse Garage Door"
  icon: mdi:garage
  sequence:
    - action: switch.turn_on
      target:
        entity_id: switch.pool_u_aussenbekl_garage_door
    - delay: "00:00:02"
    - action: switch.turn_off
      target:
        entity_id: switch.pool_u_aussenbekl_garage_door

# --- SMART RECOVERY (FOR STUCK DOOR) ---
garage_smart_recovery:
  alias: "Garage Smart Recovery"
  sequence:
    # Check if STUCK: Both sensors are 'on' (Magnets uncovered)
    - if:
        - condition: state
          entity_id: binary_sensor.garage_door_fully_closed
          state: "on"
        - condition: state
          entity_id: binary_sensor.garage_door_fully_open
          state: "on"
      then:
        # Pulse to open (resets motor logic)
        - action: script.pulse_garage_relay
        - delay: "00:00:03"
        # Pulse to close
        - action: script.pulse_garage_relay
        - delay: "00:00:20"
        - if:
            - condition: state
              entity_id: binary_sensor.garage_door_fully_closed
              state: "on" # Still uncovered/not closed
          then:
            - action: notify.notify
              data:
                title: "Garage Error"
                message: "Recovery failed. Door is still stuck between sensors!"

# --- THE 5-ATTEMPT CLOSING BATTLE ---
garage_multi_attempt_close:
  alias: "Garage 5-Attempt Recovery"
  sequence:
    - repeat:
        while:
          # Keep going as long as it's NOT closed ('on' = uncovered) AND < 5 tries
          - condition: state
            entity_id: binary_sensor.garage_door_fully_closed
            state: "on"
          - condition: template
            value_template: "{{ repeat.index <= 5 }}"
        sequence:
          - action: notify.notify
            data:
              title: "Garage Recovery"
              message: "Attempt {{ repeat.index }} of 5 to close the garage..."

          # Pulse the relay to trigger movement
          - action: script.pulse_garage_relay

          # Wait for travel (adjust 20s if your door is slower)
          - delay: "00:00:20"

          # Stop if we hit the 'off' state (Closed)
          - if:
              - condition: state
                entity_id: binary_sensor.garage_door_fully_closed
                state: "off"
            then:
              - stop: "Garage is successfully closed."

    # Final Check after the loop finishes
    - if:
        - condition: state
          entity_id: binary_sensor.garage_door_fully_closed
          state: "on"
      then:
        - action: notify.notify
          data:
            title: "CRITICAL: Garage Failure"
            message: "Failed to close after 5 attempts. Check for obstructions at Andhauserstr. 71!"

# --- garage THE MASTER BRAIN ---
garage_master_toggle:
  alias: "Garage Master Toggle"
  sequence:
    - if:
        # If it's FULLY CLOSED ('off' = magnet touching)
        - condition: state
          entity_id: binary_sensor.garage_door_fully_closed
          state: "off"
      then:
        # Just open it normally
        - action: script.pulse_garage_relay
      else:
        # It's either open or stuck - use the multi-attempt close
        - action: script.garage_multi_attempt_close


# --- pool open ---
pool_open_sequence:
  alias: "Sequence: Open Pool"
  icon: mdi:pool
  sequence:
    # --- 1. Pulse STOP ---
    - action: switch.turn_on
      target:
        entity_id: switch.pool_u_aussenbekl_pool_stop
    - delay: "00:00:01"
    - action: switch.turn_off
      target:
        entity_id: switch.pool_u_aussenbekl_pool_stop
    - delay: "00:00:01"
    # --- 2. Pulse OPEN ---
    - action: switch.turn_on
      target:
        entity_id: switch.pool_u_aussenbekl_pool_open
    - delay: "00:00:01"
    - action: switch.turn_off
      target:
        entity_id: switch.pool_u_aussenbekl_pool_open

# --- pool close ---

pool_close_sequence:
  alias: "Sequence: Close Pool"
  icon: mdi:pool
  sequence:
    # --- 1. Pulse STOP ---
    - action: switch.turn_on
      target:
        entity_id: switch.pool_u_aussenbekl_pool_stop
    - delay: "00:00:01"
    - action: switch.turn_off
      target:
        entity_id: switch.pool_u_aussenbekl_pool_stop
    - delay: "00:00:01"
    # --- 2. Pulse CLOSE ---
    - action: switch.turn_on
      target:
        entity_id: switch.pool_u_aussenbekl_pool_close
    - delay: "00:00:01"
    - action: switch.turn_off
      target:
        entity_id: switch.pool_u_aussenbekl_pool_close

# --- pool close ---

pool_stop_sequence:
  alias: "Sequence: Stop Pool"
  icon: mdi:stop
  sequence:
    # --- Pulse STOP ---
    - action: switch.turn_on
      target:
        entity_id: switch.pool_u_aussenbekl_pool_stop
    - delay: "00:00:01"
    - action: switch.turn_off
      target:
        entity_id: switch.pool_u_aussenbekl_pool_stop