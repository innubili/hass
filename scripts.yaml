 # --- garage ---
pulse_garage_relay:
  alias: "Pulse Garage Door"
  icon: mdi:garage
  sequence:
    - action: switch.turn_on
      target:
        entity_id: switch.pool_u_aussenbekl_garage_door
    - delay: "00:00:01"
    - action: switch.turn_off
      target:
        entity_id: switch.garagentor