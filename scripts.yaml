pulse_garage_relay:
  alias: Pulse Garage Door
  icon: mdi:garage
  sequence:
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_garage_door
  - delay: 00:00:02
  - action: switch.turn_off
    target:
      entity_id: switch.pool_u_aussenbekl_garage_door
garage_master_toggle:
  alias: Garage Master Toggle
  sequence:
  - if:
    - condition: state
      entity_id: binary_sensor.garage_door_fully_closed
      state: 'off'
    then:
    - action: script.pulse_garage_relay
    else:
    - action: script.garage_multi_attempt_close
pool_open_sequence:
  alias: 'Sequence: Open Pool'
  icon: mdi:pool
  sequence:
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_pool_stop
  - delay: 00:00:01
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_pool_open
  - delay: 00:00:01
  - action: switch.turn_off
    target:
      entity_id: switch.pool_u_aussenbekl_pool_open
pool_close_sequence:
  alias: 'Sequence: Close Pool'
  icon: mdi:pool
  sequence:
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_pool_stop
  - delay: 00:00:01
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_pool_close
  - delay: 00:00:01
  - action: switch.turn_off
    target:
      entity_id: switch.pool_u_aussenbekl_pool_close
pool_stop_sequence:
  alias: 'Sequence: Stop Pool'
  icon: mdi:stop
  sequence:
  - action: switch.turn_off
    target:
      entity_id: switch.pool_u_aussenbekl_pool_stop
reset_innr_garden_spots:
  alias: 'System: Put Garden Spots in Pairing Mode (all)'
  icon: mdi:lightbulb-sync
  mode: single
  sequence:
  - action: switch.turn_on
    target:
      entity_id:
      - switch.garden_garage_spots_fixed
      - switch.garden_entry_spots_fixed
  - delay:
      seconds: 6
  - repeat:
      count: 6
      sequence:
      - action: switch.turn_off
        target:
          entity_id:
          - switch.garden_garage_spots_fixed
          - switch.garden_entry_spots_fixed
      - delay:
          seconds: 1
      - action: switch.turn_on
        target:
          entity_id:
          - switch.garden_garage_spots_fixed
          - switch.garden_entry_spots_fixed
      - delay:
          milliseconds: 1000
  - action: switch.turn_on
    target:
      entity_id:
      - switch.garden_garage_spots_fixed
      - switch.garden_entry_spots_fixed
  description: ''
system_put_garden_spots_in_pairing_mode_garage_only:
  alias: 'System: Put Garden Spots in Pairing Mode (Garage only)'
  icon: mdi:lightbulb-sync
  mode: single
  description: ''
  sequence:
  - action: switch.turn_on
    target:
      entity_id:
      - switch.garden_garage_spots_fixed
  - delay:
      seconds: 6
  - repeat:
      count: 6
      sequence:
      - action: switch.turn_off
        target:
          entity_id:
          - switch.garden_garage_spots_fixed
      - delay:
          seconds: 1
      - action: switch.turn_on
        target:
          entity_id:
          - switch.garden_garage_spots_fixed
      - delay:
          seconds: 1
  - action: switch.turn_on
    target:
      entity_id:
      - switch.garden_garage_spots_fixed
system_put_garden_spots_in_pairing_mode_entry_only:
  alias: 'System: Put Garden Spots in Pairing Mode (Entry only)'
  icon: mdi:lightbulb-sync
  mode: single
  description: ''
  sequence:
  - action: switch.turn_on
    target:
      entity_id:
      - switch.garden_entry_spots_fixed
  - delay:
      seconds: 6
  - repeat:
      count: 6
      sequence:
      - action: switch.turn_off
        target:
          entity_id:
          - switch.garden_entry_spots_fixed
      - delay:
          seconds: 1
      - action: switch.turn_on
        target:
          entity_id:
          - switch.garden_entry_spots_fixed
      - delay:
          milliseconds: 1000
  - action: switch.turn_on
    target:
      entity_id:
      - switch.garden_entry_spots_fixed
pool_start_swimming:
  alias: pool_start_swimming
  icon: mdi:pool
  description: Apre piscina, abbassa tenda strada e accende luce se è buio
  sequence:
  - action: cover.open_cover
    target:
      entity_id: cover.pool_tetto
  - action: cover.close_cover
    target:
      entity_id: cover.pergola_tenda_strada
  - if:
    - condition: numeric_state
      entity_id: sensor.rain_light_sensor_illuminance
      below: 200
    then:
    - action: switch.turn_on
      target:
        entity_id: switch.pool_u_aussenbekl_pool_light
pool_finished:
  alias: pool_finished
  icon: mdi:pool-off
  description: Chiude piscina e spegne la luce
  sequence:
  - action: cover.close_cover
    target:
      entity_id: cover.pool_tetto
  - action: switch.turn_off
    target:
      entity_id: switch.pool_u_aussenbekl_pool_light
registra_e_notifica_tg138648:
  alias: Registra e Notifica TG138648
  icon: mdi:car-connected
  mode: single
  sequence:
  - condition: template
    value_template: "{% set last_reg = states('sensor.ultima_registrazione_tg138648')
      %} {% if last_reg in ['unknown', 'unavailable'] %}\n  true\n{% else %}\n  {{
      (now() - as_datetime(last_reg)).total_seconds() > 39600 }}\n{% endif %}\n"
  - action: rest_command.registra_tg138648
    response_variable: risposta_server
    continue_on_error: true
  - if:
    - condition: template
      value_template: '{{ risposta_server is defined and risposta_server[''status'']
        | int == 201 }}

        '
    then:
    - event: registrazione_parcheggio_ok
      event_data:
        targa: tg138648
    - action: notify.mobile_app_pixel_10_pro
      data:
        title: ✅ Parcheggio Märwil (TG138648)
        message: Auto registrata con successo! Rinnovo tra 11h 45m.
    - action: notify.mobile_app_mary_s_16p
      data:
        title: ✅ Parcheggio Märwil (TG138648)
        message: Auto registrata con successo! Rinnovo tra 11h 45m.
    else:
    - action: notify.mobile_app_pixel_10_pro
      data:
        title: ⚠️ ERRORE Parcheggio (TG138648)
        message: 'Registrazione fallita! Status: {{ risposta_server[''status''] |
          default(''Timeout'') }}'
    - action: notify.mobile_app_mary_s_16p
      data:
        title: ⚠️ ERRORE Parcheggio (TG138648)
        message: 'Registrazione fallita! Status: {{ risposta_server[''status''] |
          default(''Timeout'') }}'
