                - switch.garden_garage_spots_fixed
          - delay:
              seconds: 1
          - action: switch.turn_on
            target:
              entity_id:
                - switch.garden_garage_spots_fixed
          - delay:
              seconds: 1
    - action: switch.turn_on
      target:
        entity_id:
          - switch.garden_garage_spots_fixed
