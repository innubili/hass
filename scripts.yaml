pulse_garage_relay:
  alias: Pulse Garage Door
  icon: mdi:garage
  sequence:
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_garage_door
  - delay: 00:00:02
  - action: switch.turn_off
    target:
      entity_id: switch.pool_u_aussenbekl_garage_door
garage_smart_recovery:
  alias: Garage Smart Recovery
  sequence:
  - if:
    - condition: state
      entity_id: binary_sensor.garage_door_fully_closed
      state: 'on'
    - condition: state
      entity_id: binary_sensor.garage_door_fully_open
      state: 'on'
    then:
    - action: script.pulse_garage_relay
    - delay: 00:00:03
    - action: script.pulse_garage_relay
    - delay: 00:00:02
    - action: script.pulse_garage_relay
    - delay: 00:00:20
    - if:
      - condition: state
        entity_id: binary_sensor.garage_door_fully_closed
        state: 'on'
      then:
      - action: notify.notify
        data:
          title: Garage Error
          message: Recovery failed. Door is still stuck between sensors!
garage_multi_attempt_close:
  alias: Garage Multi Attempt Close
  mode: single
  sequence:
  - if:
    - condition: state
      entity_id: binary_sensor.garage_door_fully_closed
      state: 'off'
    then:
    - stop: Il garage è già chiuso, annullo l'esecuzione.
  - repeat:
      sequence:
      - action: notify.notify
        data:
          title: Garage Recovery
          message: Attempt {{ repeat.index }} of 5 to close the garage...
      - if:
        - condition: state
          entity_id: binary_sensor.garage_door_fully_open
          state: 'off'
        then:
        - action: script.garage_smart_recovery
        else:
        - action: script.pulse_garage_relay
      - wait_for_trigger:
        - platform: state
          entity_id: binary_sensor.garage_door_fully_closed
          to: 'off'
        timeout:
          seconds: 24
      until:
      - condition: or
        conditions:
        - condition: state
          entity_id: binary_sensor.garage_door_fully_closed
          state: 'off'
        - condition: template
          value_template: '{{ repeat.index >= 5 }}'
  - if:
    - condition: state
      entity_id: binary_sensor.garage_door_fully_closed
      state: 'on'
    then:
    - action: notify.notify
      data:
        title: 'CRITICAL: Garage Failure'
        message: Failed to close after 5 attempts. Check for obstructions at Andhauserstr.
          71!
garage_master_toggle:
  alias: Garage Master Toggle
  sequence:
  - if:
    - condition: state
      entity_id: binary_sensor.garage_door_fully_closed
      state: 'off'
    then:
    - action: script.pulse_garage_relay
    else:
    - action: script.garage_multi_attempt_close
pool_open_sequence:
  alias: 'Sequence: Open Pool'
  icon: mdi:pool
  sequence:
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_pool_stop
  - delay: 00:00:01
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_pool_open
  - delay: 00:00:01
  - action: switch.turn_off
    target:
      entity_id: switch.pool_u_aussenbekl_pool_open
pool_close_sequence:
  alias: 'Sequence: Close Pool'
  icon: mdi:pool
  sequence:
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_pool_stop
  - delay: 00:00:01
  - action: switch.turn_on
    target:
      entity_id: switch.pool_u_aussenbekl_pool_close
  - delay: 00:00:01
  - action: switch.turn_off
    target:
      entity_id: switch.pool_u_aussenbekl_pool_close
pool_stop_sequence:
  alias: 'Sequence: Stop Pool'
  icon: mdi:stop
  sequence:
  - action: switch.turn_off
    target:
      entity_id: switch.pool_u_aussenbekl_pool_stop
reset_innr_garden_spots:
  alias: 'System: Put Garden Spots in Pairing Mode (all)'
  icon: mdi:lightbulb-sync
  mode: single
  sequence:
  - action: switch.turn_on
    target:
      entity_id:
      - switch.garden_garage_spots_fixed
      - switch.garden_entry_spots_fixed
  - delay:
      seconds: 6
  - repeat:
      count: 6
      sequence:
      - action: switch.turn_off
        target:
          entity_id:
          - switch.garden_garage_spots_fixed
          - switch.garden_entry_spots_fixed
      - delay:
          seconds: 1
      - action: switch.turn_on
        target:
          entity_id:
          - switch.garden_garage_spots_fixed
          - switch.garden_entry_spots_fixed
      - delay:
          milliseconds: 1000
  - action: switch.turn_on
    target:
      entity_id:
      - switch.garden_garage_spots_fixed
      - switch.garden_entry_spots_fixed
  description: ''
