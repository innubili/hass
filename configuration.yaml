# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

# Text to speech
tts:
  - platform: google_translate

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

logger:
  default: warn
  logs:
    hacs: warn
    custom_components.hacs: error

frontend:
  themes: !include_dir_merge_named themes

# === aARLO ===
aarlo:
  host: https://my.arlo.com
  username: !secret arlo_usr
  password: !secret arlo_pwd
  refresh_devices_every: 60
  tfa_source: imap
  tfa_type: email
  tfa_host: imap.gmx.net
  tfa_username: !secret gmx_email
  tfa_password: !secret gmx_pwd

template:
  # --- garage cover ---
  - cover:
      - name: "Smart Garage Door"
        unique_id: my_custom_garage_door_cover_101
        device_class: garage
        # If the fully_closed sensor is 'on', it is closed. Otherwise, HA considers it open/moving.
        state: "{{ 'closed' if is_state('binary_sensor.garage_door_fully_closed', 'on') else 'open' }}"
        open_cover:
          action: script.garage_master_toggle
        close_cover:
          action: script.garage_master_toggle
        stop_cover:
          action: script.garage_master_toggle
       # Dynamically change the icon based on the exact state of both sensors
       icon: >
          {% if is_state('binary_sensor.garage_door_fully_closed', 'on') %}
            mdi:garage-variant
          {% elif is_state('binary_sensor.garage_door_fully_open', 'on') %}
            mdi:garage-open-variant
          {% else %}
            mdi:swap-vertical-bold
          {% endif %}

      # --- Pergola Roof ---
      - name: "Pergola Tetto"
        unique_id: pergola_tetto_corrected
        device_class: blind
        state: "{{ 'closed' if is_state('cover.pergola_tetto', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.pergola_tetto', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.pergola_tetto
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.pergola_tetto
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.pergola_tetto
        set_cover_position:
          action: cover.set_cover_position
          target:
            entity_id: cover.pergola_tetto
          data:
            position: "{{ 100 - position }}"

      # --- Pergola North (Dietro) ---
      - name: "Pergola Tenda Dietro"
        unique_id: pergola_tenda_nord_corrected
        device_class: shade
        state: "{{ 'closed' if is_state('cover.pergola_tenda_nord', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.pergola_tenda_nord', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.pergola_tenda_nord
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.pergola_tenda_nord
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.pergola_tenda_nord

      # --- Pergola West (Siepe) ---
      - name: "Pergola Tenda Siepe"
        unique_id: pergola_tenda_west_corrected
        device_class: shade
        state: "{{ 'closed' if is_state('cover.pergola_tenda_west', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.pergola_tenda_west', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.pergola_tenda_west
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.pergola_tenda_west
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.pergola_tenda_west
      # --- Tenda Grill ---
      - name: "Grill Tenda"
        unique_id: tenda_grill_corrected
        device_class: shade
        state: "{{ 'closed' if is_state('cover.tenda_grill', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.tenda_grill', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.tenda_grill
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.tenda_grill
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.tenda_grill

      # --- Pergola South (Strada) ---
      - name: "Pergola Tenda Strada"
        unique_id: pergola_tenda_sud_corrected
        device_class: shade
        state: "{{ 'closed' if is_state('cover.pergola_tenda_sud', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.pergola_tenda_sud', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.pergola_tenda_sud
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.pergola_tenda_sud
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.pergola_tenda_sud

      # ---- pool abdeckung ---
      - name: "Pool Tetto"
        unique_id: pool_cover_unified_shutter
        device_class: shutter
        optimistic: true
        open_cover:
          action: script.pool_open_sequence
        close_cover:
          action: script.pool_close_sequence
        stop_cover:
          action: script.pool_stop_sequence

# === CORRECTED GARDEN SPOTS ===
switch:
  - platform: template
    switches:
      garden_entry_spots_fixed:
        friendly_name: "Garden Entry (LCN)Spots"
        icon_template: mdi:outdoor-lamp
        # This tells HA to show "On" when the physical relay is "Off"
        value_template: "{{ is_state('switch.pool_u_aussenbekl_garden_spots', 'off') }}"
        # Pressing "Turn On" in HA actually turns the physical relay OFF
        turn_on:
          action: switch.turn_off
          target:
            entity_id: switch.pool_u_aussenbekl_garden_spots
        # Pressing "Turn Off" in HA actually turns the physical relay ON
        turn_off:
          action: switch.turn_on
          target:
            entity_id: switch.pool_u_aussenbekl_garden_spots
  - platform: template
    switches:
      garden_garage_spots_fixed:
        friendly_name: "Garden Garage (LCN)Spots"
        icon_template: mdi:outdoor-lamp
        # This tells HA to show "On" when the physical relay is "Off"
        value_template: "{{ is_state('switch.pool_u_aussenbekl_led_strip_entrance', 'off') }}"
        # Pressing "Turn On" in HA actually turns the physical relay OFF
        turn_on:
          action: switch.turn_off
          target:
            entity_id: switch.pool_u_aussenbekl_led_strip_entrance
        # Pressing "Turn Off" in HA actually turns the physical relay ON
        turn_off:
          action: switch.turn_on
          target:
            entity_id: switch.pool_u_aussenbekl_led_strip_entrance

# light groups
