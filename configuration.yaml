# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

# Text to speech
tts:
  - platform: google_translate

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

logger:
  default: warn
  logs:
    hacs: warn
    custom_components.hacs: error

frontend:
  themes: !include_dir_merge_named themes

device_tracker:
  - platform: iphonedetect
    consider_home: 60
    new_device_defaults:
      track_new_devices: true
    hosts:
      MarysiPhoneX: 192.168.86.39

# === aARLO ===
aarlo:
  host: https://my.arlo.com
  username: !secret arlo_usr
  password: !secret arlo_pwd
  refresh_devices_every: 60
  tfa_source: imap
  tfa_type: email
  tfa_host: imap.gmx.net
  tfa_username: !secret gmx_email
  tfa_password: !secret gmx_pwd

# === garage cover ===
cover:
  - platform: template
    covers:
      garage_door:
        device_class: garage
        friendly_name: "Garage Door"
        # This calls your script whenever you press Open, Close, or Stop
        open_cover:
          action: script.pulse_garage_door
        close_cover:
          action: script.pulse_garage_door
        stop_cover:
          action: script.pulse_garage_door

# === CORRECTED GARDEN SPOTS ===
switch:
  - platform: template
    switches:
      garden_entry_spots_fixed:
        friendly_name: "Garden Entry Spots"
        icon_template: mdi:outdoor-lamp
        # This tells HA to show "On" when the physical relay is "Off"
        value_template: "{{ is_state('switch.YOUR_ORIGINAL_GARDEN_SPOTS', 'off') }}"
        # Pressing "Turn On" in HA actually turns the physical relay OFF
        turn_on:
          action: switch.turn_off
          target:
            entity_id: switch.pool_u_aussenbekl_garden_spots
        # Pressing "Turn Off" in HA actually turns the physical relay ON
        turn_off:
          action: switch.turn_on
          target:
            entity_id: switch.pool_u_aussenbekl_garden_spots

switch:
  - platform: template
    switches:
      garden_garage_spots_fixed:
        friendly_name: "Garden Spots"
        icon_template: mdi:outdoor-lamp
        # This tells HA to show "On" when the physical relay is "Off"
        value_template: "{{ is_state('switch.YOUR_ORIGINAL_GARDEN_SPOTS', 'off') }}"
        # Pressing "Turn On" in HA actually turns the physical relay OFF
        turn_on:
          action: switch.turn_off
          target:
            entity_id: switch.pool_u_aussenbekl_led_strip_entrance
        # Pressing "Turn Off" in HA actually turns the physical relay ON
        turn_off:
          action: switch.turn_on
          target:
            entity_id: switch.pool_u_aussenbekl_led_strip_entrance
