# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:

# Text to speech
tts:
  - platform: google_translate

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

rest_command:
  post_entities:
    url: "https://script.google.com/macros/s/AKfycbwVDHTwMd3pQnAbJyOFdAGkTFbRiibUAkjo-JLF4Zj9ig4M_Xwkyk9On2blXwrDNgKe/exec"
    method: POST
    content_type: "application/json"
    payload: >
      {
        "data": "Esportazione del {{ now().strftime('%d/%m/%Y %H:%M') }}\n{% for state in states | groupby('domain') %}\n=== {{ state.grouper | upper }} ===\n{% for entity in state.list %}- {{ entity.entity_id }} ({{ entity.name }})\n{% endfor %}\n{% endfor %}"
      }

  # --- INIZIO NUOVI COMANDI PARCHEGGIO ---
  registra_tg138648:
    url: "https://parkosecure-backend-backup.herokuapp.com/api/parkingFields/6937e3ffa3acc200159e902d/registeredCars"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: '{"licensePlate":"tg138648","duration":12,"visit":"-","number":null,"email":"","language":"de"}'

  registra_tg177824:
    url: "https://parkosecure-backend-backup.herokuapp.com/api/parkingFields/6937e3ffa3acc200159e902d/registeredCars"
    method: POST
    headers:
      Content-Type: "application/json"
    payload: '{"licensePlate":"tg177824","duration":12,"visit":"-","number":null,"email":"","language":"de"}'
  # --- FINE NUOVI COMANDI PARCHEGGIO ---

logger:
  default: warn
  logs:
    hacs: warn
    custom_components.hacs: error

frontend:
  themes: !include_dir_merge_named themes

# === aARLO ===
aarlo:
  host: https://my.arlo.com
  username: !secret arlo_usr
  password: !secret arlo_pwd
  refresh_devices_every: 60
  tfa_source: imap
  tfa_type: email
  tfa_host: imap.gmx.net
  tfa_username: !secret gmx_email
  tfa_password: !secret gmx_pwd

template:
  # --- garage cover ---
  - cover:
      # --- Pergola Roof ---
      - name: "Pergola Tetto"
        unique_id: pergola_tetto_corrected
        device_class: blind
        state: "{{ 'closed' if is_state('cover.pergola_tetto', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.pergola_tetto', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.pergola_tetto
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.pergola_tetto
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.pergola_tetto
        set_cover_position:
          action: cover.set_cover_position
          target:
            entity_id: cover.pergola_tetto
          data:
            position: "{{ 100 - position }}"

      # --- Pergola North (Dietro) ---
      - name: "Pergola Tenda Dietro"
        unique_id: pergola_tenda_nord_corrected
        device_class: shade
        state: "{{ 'closed' if is_state('cover.pergola_tenda_nord', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.pergola_tenda_nord', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.pergola_tenda_nord
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.pergola_tenda_nord
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.pergola_tenda_nord

      # --- Pergola West (Siepe) ---
      - name: "Pergola Tenda Siepe"
        unique_id: pergola_tenda_west_corrected
        device_class: shade
        state: "{{ 'closed' if is_state('cover.pergola_tenda_west', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.pergola_tenda_west', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.pergola_tenda_west
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.pergola_tenda_west
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.pergola_tenda_west
      # --- Tenda Grill ---
      - name: "Grill Tenda"
        unique_id: tenda_grill_corrected
        device_class: shade
        state: "{{ 'closed' if is_state('cover.tenda_grill', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.tenda_grill', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.tenda_grill
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.tenda_grill
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.tenda_grill

      # --- Pergola South (Strada) ---
      - name: "Pergola Tenda Strada"
        unique_id: pergola_tenda_sud_corrected
        device_class: shade
        state: "{{ 'closed' if is_state('cover.pergola_tenda_sud', 'open') else 'open' }}"
        position: "{{ 100 - (state_attr('cover.pergola_tenda_sud', 'current_position') | int(0)) }}"
        open_cover:
          action: cover.close_cover
          target:
            entity_id: cover.pergola_tenda_sud
        close_cover:
          action: cover.open_cover
          target:
            entity_id: cover.pergola_tenda_sud
        stop_cover:
          action: cover.stop_cover
          target:
            entity_id: cover.pergola_tenda_sud

      # ---- pool abdeckung ---
      - name: "Pool Tetto"
        unique_id: pool_cover_unified_shutter
        device_class: shutter
        optimistic: true
        open_cover:
          action: script.pool_open_sequence
        close_cover:
          action: script.pool_close_sequence
        stop_cover:
          action: script.pool_stop_sequence

  # Migration of legacy template switches
  - switch:
      - name: "Garden Entry (LCN)Spots"
        unique_id: garden_entry_spots_fixed_modern
        icon: mdi:outdoor-lamp
        state: "{{ is_state('switch.pool_u_aussenbekl_garden_spots', 'off') }}"
        turn_on:
          action: switch.turn_off
          target:
            entity_id: switch.pool_u_aussenbekl_garden_spots
        turn_off:
          action: switch.turn_on
          target:
            entity_id: switch.pool_u_aussenbekl_garden_spots

      - name: "Garden Garage (LCN)Spots"
        unique_id: garden_garage_spots_fixed_modern
        icon: mdi:outdoor-lamp
        state: "{{ is_state('switch.pool_u_aussenbekl_led_strip_entrance', 'off') }}"
        turn_on:
          action: switch.turn_off
          target:
            entity_id: switch.pool_u_aussenbekl_led_strip_entrance
        turn_off:
          action: switch.turn_on
          target:
            entity_id: switch.pool_u_aussenbekl_led_strip_entrance

  - trigger:
      - trigger: event
        event_type: registrazione_parcheggio_ok
        event_data:
          targa: tg138648
    sensor:
      - name: "Ultima Registrazione TG138648"
        unique_id: ultima_registrazione_tg138648
        state: "{{ now() }}"
        device_class: timestamp

  - trigger:
      - trigger: event
        event_type: registrazione_parcheggio_ok
        event_data:
          targa: tg177824
    sensor:
      - name: "Ultima Registrazione TG177824"
        unique_id: ultima_registrazione_tg177824
        state: "{{ now() }}"
        device_class: timestamp

# light groups
light:
  # Gruppo Settore GARAGE
  - platform: group
    name: "Garden Spots Garage"
    unique_id: garden_spots_garage_group
    entities:
      - light.spot1 # palme
      - light.spot3 # rododendro
      - light.spot5 # pseudo acacia
      - light.spot7 # ahorn
      - light.spot9 # hydrangea

  # Gruppo Settore ENTRY
  - platform: group
    name: "Garden Spots Entry"
    unique_id: garden_spots_entry_group
    entities:
      - light.spot2 # prunus in mezzo
      - light.spot8 # prunus porta
      - light.spot6 # prunus strada

  # Gruppo DI GRUPPI (Il "Master" per tutto il giardino)
  - platform: group
    name: "Garden Spots All"
    unique_id: garden_spots_all_group
    entities:
      - light.spot1 # palme
      - light.spot2 # ................prunus in mezzo
      - light.spot3 # rododendro
      # - light.spot4                               reserve ready to use as replacment
      - light.spot5 # pseudo acacia
      - light.spot6 # ................prunus strada
      - light.spot7 # ahorn
      - light.spot8 # ................prunus porta
      - light.spot9 # hydrangea

cover:
  - platform: group
    name: "Tende Pergola (tutte)"
    unique_id: pergola_tende_3
    entities:
      - cover.pergola_tenda_strada
      - cover.pergola_tenda_dietro
      - cover.pergola_tenda_siepe
